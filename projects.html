<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <style>
     body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }

        nav {
            background-color: #444;
            padding: 10px 0;
            text-align: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
        }

        section {
            padding: 20px;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .project {
            margin-bottom: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: #fff;
        }

        .project h2 {
            margin-top: 0;
        }

        .project p {
            margin: 0;
        }

        .reference {
            margin-bottom: 20px;
        }

        .reference h3 {
            margin-top: 0;
        }
    </style>
</head>

<body>
    <header>
        <h1>My Portfolio</h1>
        <p>Graphic Designer</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="references.html">References</a>
    </nav>

    <section class="container">
        <h2>My Projects</h2>
        <div class="project" onclick="openProjectFolder('project1')">
            <h3>Project 1</h3>
            <p>Description of project 1.</p>
        </div>
        <div class="project" onclick="openProjectFolder('project2')">
            <h3>Project 2</h3>
            <p>Description of project 2.</p>
        </div>
        <!-- Add more project entries as needed -->
    </section>

    <footer>
        <p>&copy; 2024 My Portfolio</p>
    </footer>

    <script>
        function openProjectFolder(projectId) {
            // Define folder URLs for each project
            var folderURLs = {
                'project1': 'https://example.com/project1',
                'project2': 'https://example.com/project2'
                // Add more project folder URLs as needed
            };

            // Redirect the user to the corresponding project folder URL
            var projectFolderURL = folderURLs[projectId];
            if (projectFolderURL) {
                window.location.href = projectFolderURL;
            } else {
                console.error('Folder URL not found for project:', projectId);
            }
        }
    </script>
</body>

</html>
